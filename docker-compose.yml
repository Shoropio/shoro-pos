services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/database/shoro_pos.db
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"
    volumes:
      - shoro_data:/app/database
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready')"]
      interval: 20s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: frontend/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  shoro_data:
